<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BibliotecaFácil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="contenedor">
    <header class="hero">
      <div>
        <h1>📚 BibliotecaFácil</h1>
        <p>Organiza tus libros, encuentra tus favoritos y mantén tu progreso en un solo lugar.</p>
      </div>
    </header>

    <form id="formLibro" class="formulario">
      <div class="campo">
        <label for="titulo">Título</label>
        <input id="titulo" name="titulo" type="text" placeholder="Ej. El principito" required>
      </div>

      <div class="campo">
        <label for="autor">Autor</label>
        <input id="autor" name="autor" type="text" placeholder="Ej. Antoine de Saint-Exupéry" required>
      </div>

      <div class="campo">
        <label for="categoria">Categoría</label>
        <input id="categoria" name="categoria" type="text" placeholder="Ej. Fantasía" required>
      </div>

      <div class="campo">
        <label for="portada">Portada</label>
        <input id="portada" name="portada" type="file" accept="image/*">
        <div id="previewPortadaContenedor" class="preview-portada hidden">
          <img id="previewPortada" alt="Vista previa de la portada" class="preview-img">
        </div>
      </div>

      <div class="campo">
        <label>Valoración</label>
        <div id="valoracionEstrellas" class="estrellas" role="radiogroup" aria-label="Valoración del libro">
          <button type="button" class="estrella" data-value="1" aria-label="1 estrella">★</button>
          <button type="button" class="estrella" data-value="2" aria-label="2 estrellas">★</button>
          <button type="button" class="estrella" data-value="3" aria-label="3 estrellas">★</button>
          <button type="button" class="estrella" data-value="4" aria-label="4 estrellas">★</button>
          <button type="button" class="estrella" data-value="5" aria-label="5 estrellas">★</button>
        </div>
      </div>

      <div class="campo">
        <label for="paginas">Número de páginas</label>
        <input id="paginas" name="paginas" type="number" min="1" placeholder="Ej. 240">
      </div>

      <div class="campo">
        <label for="fechaFin">Fecha de finalización</label>
        <input id="fechaFin" name="fechaFin" type="date">
      </div>

      <div class="campo">
        <label for="notas">Notas personales</label>
        <textarea id="notas" name="notas" rows="3" placeholder="Añade tus impresiones, citas o ideas..."></textarea>
      </div>

      <div class="campo">
        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="Read">Leído</option>
          <option value="Reading">Leyendo</option>
          <option value="Pending">Pendiente</option>
        </select>
      </div>

      <div class="acciones">
        <button type="submit" id="btnGuardar">Añadir libro</button>
        <button type="button" id="btnCancelar" class="secundario hidden">Cancelar</button>
      </div>
    </form>

    <section class="panel">
      <div class="controles">
        <input id="buscar" type="search" placeholder="Buscar por título, autor o categoría">
        <select id="filtroCategoria">
          <option value="todas">Todas las categorías</option>
        </select>
        <select id="filtroEstado">
          <option value="todos">Todos los estados</option>
          <option value="Read">Leídos</option>
          <option value="Reading">Leyendo</option>
          <option value="Pending">Pendientes</option>
        </select>
      </div>

      <div class="acciones-importacion">
        <button type="button" id="btnExportar">Exportar JSON</button>
        <button type="button" id="btnImportar">Importar JSON</button>
        <input id="inputImportar" type="file" accept="application/json" class="hidden">
      </div>

      <div id="estadisticasBiblioteca" class="estadisticas"></div>
      <p id="contadorLibros" class="contador"></p>
      <div id="estadoVacio" class="estado-vacio hidden">No hay libros que coincidan con tu búsqueda.</div>
      <ul id="listaLibros"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
